blueprint:
  name: Homematic(IP) Local Show device error
  description:
    Display errors emitted by devices. This is an unfiltered blueprint. More filters should be added to the trigger.
    v2026-04-14
  domain: automation
  homeassistant:
    min_version: "2026.3.0"
  source_url: https://github.com/sukramj/homematicip_local/blob/main/blueprints/automation/homematicip_local_show_device_error.yaml

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: homematic.device_error

action:
  - choose:
      - conditions: "{{ trigger.event.data.error == true }}"
        sequence:
          - action: persistent_notification.create
            data:
              notification_id: "{{ trigger.event.data.identifier }}"
              title: "{{ trigger.event.data.title }}"
              message: "{{ trigger.event.data.message }}"
      - conditions: "{{ trigger.event.data.error == false }}"
        sequence:
          - action: persistent_notification.dismiss
            data:
              notification_id: "{{ trigger.event.data.identifier }}"

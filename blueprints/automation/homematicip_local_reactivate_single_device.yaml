blueprint:
  name: Homematic(IP) reactivate single device
  description: Reactivate a single device marked as not available.
    v2026-04-14
  domain: automation
  homeassistant:
    min_version: "2026.3.0"
  source_url: https://github.com/sukramj/homematicip_local/blob/devel/blueprints/automation/homematicip_local_reactivate_single_device.yaml
  input:
    device_id:
      name: Homematic device
      description: The Homematic device to reactivate.
      selector:
        device:
          integration: homematicip_local
    delay_seconds:
      name: Delay before reactivation (seconds)
      description: Wait before forcing device availability. This gives the device time to respond after the unavailability event.
      default: 10
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: homematic.device_availability
    event_data:
      device_id: !input device_id
      unavailable: true

action:
  - delay:
      seconds: !input delay_seconds
  - action: homematicip_local.force_device_availability
    data:
      device_id: "{{ trigger.event.data.device_id }}"

    "use-symbolic-message-instead",
]
per-file-ignores = [
    # redefined-outer-name: Tests reference fixtures in the test function
    # use-implicit-booleaness-not-comparison: Tests need to validate that a list
    # or a dict is returned
    "/tests/:redefined-outer-name,use-implicit-booleaness-not-comparison",
]

[tool.pylint.REPORTS]
score = false

[tool.pylint.TYPECHECK]
ignored-classes = [
    "_CountingAttr",  # for attrs
]
mixin-class-rgx = ".*[Mm]ix[Ii]n"

[tool.pylint.FORMAT]
expected-line-ending-format = "LF"

[tool.pylint.EXCEPTIONS]
overgeneral-exceptions = [
    "builtins.Exception",
]

[tool.pylint.TYPING]
runtime-typing = false

[tool.pylint.CODE_STYLE]
max-line-length-suggestions = 120

[tool.pytest.ini_options]
pythonpath = [
    ".",
    "custom_components.homematicip_local",
]
testpaths = [
    "tests",
]
norecursedirs = [
    ".git",
    "testing_config",
]
log_format = "%(asctime)s.%(msecs)03d %(levelname)-8s %(threadName)s %(name)s:%(filename)s:%(lineno)s %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
asyncio_debug = true
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-n auto --dist loadscope"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "benchmark: performance benchmark tests",
]
filterwarnings = [
    "error::sqlalchemy.exc.SAWarning",
]

[tool.ruff]
target-version = "py314" # Target Python version for Ruff
line-length = 120 # Maximum line length for linting and formatting guidance
# Locally-installed HACS lives under custom_components/hacs (gitignored); exclude it.
extend-exclude = ["custom_components/hacs"]

[tool.ruff.lint]
select = [
    "A", # Variable {name} is shadowing a Python builtin
    "ASYNC", # flake8-async
    "B002", # Python does not support the unary prefix increment
    "B005", # Using .strip() with multi-character strings is misleading
    "B007", # Loop control variable {name} not used within loop body
    "B009", # Do not call getattr with a constant attribute value
    "B014", # Exception handler with duplicate exception
    "B015", # Pointless comparison. Did you mean to assign a value? Otherwise, prepend assert or remove it.
    "B017", # pytest.raises(BaseException) should be considered evil
    "B018", # Found useless attribute access. Either assign it to a variable or remove it.
    "B023", # Function definition does not bind loop variable {name}
    "B024", # `{name}` is an abstract base class, but it has no abstract methods or properties
    "B025", # try-except* block with duplicate exception {name}
    "B026", # Star-arg unpacking after a keyword argument is strongly discouraged
    "B032", # Possible unintentional type annotation (using :). Did you mean to assign (using =)?
    "B035", # Dictionary comprehension uses static key
    "B904", # Use raise from to specify exception cause
    "B905", # zip() without an explicit strict= parameter
    "BLE", # flake8-blind-except - forbids bare `except Exception:` without context
    "C", # complexity
    "COM818", # Trailing comma on bare tuple prohibited
    "D", # docstrings
    "DTZ003", # Use datetime.now(tz=) instead of datetime.utcnow()
    "DTZ004", # Use datetime.fromtimestamp(ts, tz=) instead of datetime.utcfromtimestamp(ts)
    "E", # pycodestyle
    "F", # pyflakes/autoflake
    "F541", # f-string without any placeholders
    "FLY", # flynt
    "FURB", # refurb - modern Python patterns
    "G", # flake8-logging-format
    "I", # isort
    "INP", # flake8-no-pep420
    "ISC", # flake8-implicit-str-concat
    "ICN001", # import concentions; {name} should be imported as {asname}
    "LOG", # flake8-logging
    "N804", # First argument of a class method should be named cls
    "N805", # First argument of a method should be named self
    "N815", # Variable {name} in class scope should not be mixedCase
    "PERF", # Perflint
    "PGH", # pygrep-hooks
    "PIE", # flake8-pie
    "PL", # pylint
    "PT", # flake8-pytest-style
    "PTH", # flake8-use-pathlib - prefer pathlib over os.path
    "PYI", # flake8-pyi
    "RET", # flake8-return
    "RSE", # flake8-raise
    "RUF005", # Consider iterable unpacking instead of concatenation
    "RUF006", # Store a reference to the return value of asyncio.create_task
    "RUF007", # Prefer itertools.pairwise() over zip() when iterating over successive pairs
    "RUF008", # Do not use mutable default values for dataclass attributes
    "RUF010", # Use explicit conversion flag
    "RUF013", # PEP 484 prohibits implicit Optional
    "RUF016", # Slice in indexed access uses non-integer type
    "RUF017", # Avoid quadratic list summation
    "RUF018", # Avoid assignment expressions in assert statements
    "RUF019", # Unnecessary key check before dictionary access
    "RUF020", # {never_like} | T is equivalent to T
    "RUF021", # Parenthesize a and b expressions when chaining and and or together
    "RUF022", # Sort __all__
    "RUF023", # Sort __slots__
    "RUF024", # Do not pass mutable objects as values to dict.fromkeys
    "RUF026", # default_factory is a positional-only argument to defaultdict
    "RUF030", # print() call in assert statement is likely unintentional
    "RUF032", # Decimal() called with float literal argument
    "RUF033", # __post_init__ method with argument defaults
    "RUF034", # Useless if-else condition
    "RUF100", # Unused `noqa` directive
    "RUF101", # noqa directives that use redirected rule codes
    "S", # flake8-bandit (full suite)
    "SIM", # flake8-simplify
    "SLF", # flake8-self - forbid private member access from outside
    "SLOT", # flake8-slots
    "T100", # Trace found: {name} used
    "T20", # flake8-print
    "TC", # flake8-type-checking
    "TID", # flake8-tidy-imports
    "TRY", # tryceratops
    "UP", # pyupgrade
    "UP031", # Use format specifiers instead of percent format
    "UP032", # Use f-string instead of `format` call
    "W", # pycodestyle
]

ignore = [
    "A005", # Module shadows a Python standard-library module
    "D202", # No blank lines allowed after function docstring
    "D203", # 1 blank line required before class docstring
    "D212",  # Multi-line docstring summary should start at the first line
    "D406", # Section name should end with a newline
    "D407", # Section name underlining
    "E501", # line too long
    "E731", # do not assign a lambda expression, use a def

    "PLC1901", # {existing} can be simplified to {replacement} as an empty string is falsey; too many false positives
    "PLR0911", # Too many return statements ({returns} > {max_returns})
    "PLR0912", # Too many branches ({branches} > {max_branches})
    "PLR0913", # Too many arguments to function call ({c_args} > {max_args})
    "PLR0915", # Too many statements ({statements} > {max_statements})
    "PLR2004", # Magic value used in comparison, consider replacing {value} with a constant variable
    "PLW2901", # Outer {outer_kind} variable {name} overwritten by inner {inner_kind} target
    "PT011", # pytest.raises({exception}) is too broad, set the `match` parameter or use a more specific exception
    "PT012", # `pytest.raises()` block should contain a single simple statement
    "PT018", # Assertion should be broken down into multiple parts
    "SIM115", # Use context handler for opening files
    "TRY003", # Avoid specifying long messages outside the exception class
    "TRY400", # Use `logging.exception` instead of `logging.error`
    # Ignored due to incompatible with mypy: https://github.com/python/mypy/issues/15238
    "UP040", # Checks for use of TypeAlias annotation for declaring type aliases.
    "UP046", # Non PEP 695 generic class

    # May conflict with the formatter, https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
    "W191", # Tabs indentation (formatter enforces spaces)
    "E111", # Indentation is not a multiple of four
    "E114", # Indentation is not a multiple of four (comment)
    "E117", # Over-indented
    "D206", # Docstring indentation not aligned
    "D300", # Use triple double quotes for docstrings
    "Q", # Quote normalization conflicts with formatter
    "COM812", # Missing trailing comma (formatter handles commas)
    "COM819", # Trailing comma prohibited in some contexts
    "ISC001", # Implicit string concatenation check (formatter handles)

    "RET503",
    "TRY301",
    "PYI041",

    # TC rules - low benefit for this project (mirrors aiohomematic/core)
    "TC001", # typing-only-first-party-import
    "TC002", # typing-only-third-party-import
    "TC003", # typing-only-standard-library-import
    "TC006", # quote type expressions in cast() - minimal runtime benefit
]

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[tool.ruff.lint.flake8-import-conventions.extend-aliases]
voluptuous = "vol"
"aiohomematic.central" = "hmcu"
"aiohomematic.client" = "hmcl"
"aiohomematic.model.custom.definition" = "hmed"
"aiohomematic.model.custom.data_point" = "hmce"
"aiohomematic.model.data_point" = "hme"
"aiohomematic.support" = "hms"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"async_timeout".msg = "use asyncio.timeout instead"
"pytz".msg = "use zoneinfo instead"

[tool.ruff.lint.per-file-ignores]
# Relative imports between modules of the same integration are a standard
# HA custom-component convention (see core's config which does the same).
"custom_components/homematicip_local/*" = ["TID252"]
"script/*" = [
    "T20", # Allow print/debug statements in scripts
    "S101", # assert usage is fine in dev scripts
    "S110", "S112", # try-except-pass/continue in dev scripts
    "S603", # subprocess calls in dev scripts
    "BLE001", # broad except in dev scripts
    "PTH", # os.path usage in scripts is not worth refactoring
    "C901", # complexity limits relaxed in dev scripts
    "INP001", # implicit namespace package
]
"tests/*.py" = [
    "D100", "D101", "D102", "D103", "D107", # docstring requirements
    "TRY002", # too-broad exception guidance
    "S101", # assert usage is expected in tests
    "S104", # bind-all-interfaces (0.0.0.0) is fine in test fixtures
    "S105", "S106", # hardcoded passwords in test fixtures
    "S110", "S112", # try-except-pass/continue in fixture teardown
    "S311", # non-cryptographic random in tests
    "BLE001", # broad `except Exception` in tests (fixture cleanup)
    "PLR2004", # magic values in assertions
    "C901", # complex test scenarios
    "PTH", # os.path in tests is not worth refactoring
    "SLF001", # private member access in tests is sometimes necessary
]

[tool.ruff.lint.isort]
required-imports = ["from __future__ import annotations"]
force-sort-within-sections = true
known-first-party = [
    "homeassistant", "aiohomematic", "aiohomematic_config"
]
combine-as-imports = true
split-on-trailing-comma = false

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.coverage.run]
branch = true
source = ["custom_components/homematicip_local"]
parallel = true
concurrency = ["thread"]

[tool.coverage.report]
show_missing = true
skip_empty = true
skip_covered = false
sort = "cover"
precision = 2

# Exclude patterns for lines that shouldn't be counted
exclude_lines = [
    # Have to re-enable the standard pragma
    "pragma: no cover",

    # Don't complain about missing debug-only code:
    "def __repr__",
    "if self\\.debug",
    "if settings\\.DEBUG",

    # Don't complain if tests don't hit defensive assertion code:
    "raise AssertionError",
    "raise NotImplementedError",

    # Don't complain if non-runnable code isn't run:
    "if 0:",
    "if False:",
    "if __name__ == .__main__.:",

    # TYPE_CHECKING and @overload blocks are never executed during pytest run
    "if TYPE_CHECKING:",
    "@overload",

    # Abstract methods
    "@abstractmethod",
    "@abc.abstractmethod",

    # Protocol methods (structural subtyping)
    "\\.\\.\\.",

    # Defensive programming
    "except ImportError:",
]

[tool.coverage.html]
directory = "htmlcov"
show_contexts = true

[tool.mypy]
python_version = "3.14" # Target Python version used for type checking
strict = true  # Enable mypy strict mode (enables a suite of rigorous checks)
show_error_codes = true  # Include error codes in messages
follow_imports = "normal"  # Follow imports normally (type-check imported modules as needed)
local_partial_types = true  # Allow partial type inference for local variables (e.g., None placeholders)
strict_equality = true  # Enforce precise equality checks (no implicit coercions)
no_implicit_optional = true  # Require explicit Optional[...] (no implicit None in unions)
warn_incomplete_stub = true  # Warn about incomplete type stubs (.pyi)
warn_redundant_casts = true  # Flag unnecessary type casts
warn_unused_configs = true  # Warn about unused [mypy-*] config sections or options
warn_unused_ignores = true  # Warn when a `# type: ignore` is unnecessary
# Exclude generated or non-source directories
exclude = "(?x)(^build/|^dist/|^htmlcov/|^.*\\.egg-info/|^venv/|^script/)"
# Turn on specific extra checks
enable_error_code = [
    "ignore-without-code",
    "redundant-self",
    "truthy-iterable",
    "possibly-undefined",
    "unused-awaitable",
]
# Silence noisy/third-party related errors
disable_error_code = [
    "annotation-unchecked",
    "import-not-found",
    "import-untyped",
]

extra_checks = false # Keep default (avoids experimental extra checks)
check_untyped_defs = true # Type-check function bodies even without annotations
disallow_incomplete_defs = true # Require full type annotations for function signatures
disallow_subclassing_any = true # Forbid subclassing values of type Any
disallow_untyped_calls = true  # Disallow calling functions without type annotations
disallow_untyped_decorators = true  # Disallow applying untyped decorators to functions
disallow_untyped_defs = true  # Disallow defining functions without type annotations
warn_return_any = true  # Warn when returning values of type Any
warn_unreachable = true  # Warn about code paths that are statically unreachable


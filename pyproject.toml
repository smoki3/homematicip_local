[tool.pylint.MAIN]
py-version = "3.14"
ignore = [
    "tests",
]
# Use a conservative default here; 2 should speed up most setups and not hurt
# any too bad. Override on command line as appropriate.
jobs = 2
init-hook = """\
    from pathlib import Path; \
    import sys; \

    from pylint.config import find_default_config_files; \

    sys.path.append( \
        str(Path(next(find_default_config_files())).parent.joinpath('pylint/plugins'))
    ); \
    sys.path.append(".") \
    """
load-plugins = [
    "pylint.extensions.code_style",
    "pylint.extensions.typing",
    "pylint_strict_informational",
    "pylint_per_file_ignores",
]
persistent = false
extension-pkg-allow-list = [
    "av.audio.stream",
    "av.logging",
    "av.stream",
    "ciso8601",
    "orjson",
    "cv2",
]

[tool.pylint.BASIC]
class-const-naming-style = "any"
good-names = [
    "_",
    "ev",
    "ex",
    "fp",
    "i",
    "id",
    "j",
    "k",
    "Run",
    "ip",
    "T",
]

[tool.pylint."MESSAGES CONTROL"]
# Reasons disabled:
# format - handled by black
# locally-disabled - it spams too much
# duplicate-code - unavoidable
# cyclic-import - doesn't test if both import on load
# abstract-class-little-used - prevents from setting right foundation
# unused-argument - generic callbacks and setup methods create a lot of warnings
# too-many-* - are not enforced for the sake of readability
# too-few-* - same as too-many-*
# abstract-method - with intro of async there are always methods missing
# inconsistent-return-statements - doesn't handle raise
# too-many-ancestors - it's too strict.
# wrong-import-order - isort guards this
# consider-using-f-string - str.format sometimes more readable
# ---
# Enable once current issues are fixed:
# consider-using-namedtuple-or-dataclass (Pylint CodeStyle extension)
# consider-using-assignment-expr (Pylint CodeStyle extension)
disable = [
    "format", # Formatting concerns (use ruff instead)
    "abstract-method", # Allow abstract base classes without all abstract methods implemented
    "cyclic-import", # Ignore import cycles between modules
    "duplicate-code", # Allow similar/duplicated code blocks without warning
    "inconsistent-return-statements", # Allow functions with branches that don't all return explicitly
    "import-outside-toplevel",  # PLC0415: Allow imports inside functions to avoid heavy top-level imports
    "locally-disabled", # Allow local `pylint: disable` pragmas without warnings
    "not-context-manager", # Allow using objects in with-statements without context manager methods
    "too-few-public-methods", # Allow small data classes/helpers without many public methods
    "too-many-ancestors", # Allow deep inheritance hierarchies
    "too-many-arguments", # Permit functions with many parameters when pragmatic
    "too-many-instance-attributes", # Allow classes with many instance attributes
    "too-many-lines", # Allow large modules when splitting would hurt readability
    "too-many-locals", # Allow functions with many local variables
    "too-many-positional-arguments", # R0917: Permit many positional params when API stability/readability wins
    "too-many-public-methods", # Allow classes exposing many public methods when warranted
    "too-many-boolean-expressions", # Permit complex boolean conditions when clearer than refactoring
    "wrong-import-order", # Enforced by Ruff/isort; allow non-standard ordering here
    "consider-using-f-string", # PLC0209: Allow str.format/percent formatting when more readable
    "consider-using-namedtuple-or-dataclass", # Too opinionated; dataclasses/namedtuples by dev choice
    "consider-using-assignment-expr", # Decision to use := better left to devs

    # Handled by ruff (additional from core)
    "broad-except", # BLE001
    "broad-exception-raised", # TRY002
    "protected-access", # SLF001
    "no-else-break", # RET508
    "no-else-continue", # RET507
